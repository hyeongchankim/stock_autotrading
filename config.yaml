seed_capital: 1000000  # 시드 100만원 (KRW)

risk:
  stop_loss_pct: 0.09        # 손절 9% (10%에서 축소 - 백테스트로 검증한 손익비 개선. 8%는 MDD가 악화되어 기각)
  take_profit_pct: 0.07      # 익절 7% (즉시 청산 - 트레일링 방식은 백테스트 결과 더 나빠서 기각, risk_manager.py 참고)
  position_size_pct: 0.30    # 종목당 비중 30%
  daily_max_loss_pct: 0.30   # 일일 최대 손실한도 30% (시드 대비, 도달 시 당일 신규 진입 중단)

strategies:
  trend_following:
    ma_cross:
      enabled: false   # 백테스트 결과 whale_flow 단독이 더 나아서 비활성 (아래 "고래 추적 지표 검증 기록" 참고)
      short_window: 5
      long_window: 20
    bollinger_breakout:
      enabled: false   # 돈치안 채널로 교체 후 다시 whale_flow로 교체됨 (아래 참고)
      window: 20
      num_std: 2.0
    donchian_breakout:
      enabled: false   # whale_flow 단독 조합이 더 나아서 비활성 (아래 "고래 추적 지표 검증 기록" 참고)
      entry_window: 20
      exit_window: 10
    macd:
      enabled: false   # 백테스트 검증 중 (아래 "다음 방향 검증 기록" 참고)
      fast: 12
      slow: 26
      signal: 9
    whale_flow:
      enabled: true    # "고래 추적" - 외국인+기관 순매수 추종. 백테스트로 검증한 채택값 -
                        # 이평선/돈치안 대신 이 전략 단독이 수익률·MDD·승률 전부 더 나았음
                        # (아래 "고래 추적 지표 검증 기록" 참고). data.krx.co.kr 계정 필요
                        # (KRX_ID/KRX_PW 환경변수) - 계정 없으면 자동으로 조용히 비활성 상태로
                        # 동작함 (에러 없음, HOLD만 반환)
      window: 5                   # 최근 5거래일 누적 순매수로 판단
      buy_threshold_ratio: 0.05    # 5거래일 거래대금 대비 외국인+기관 순매수 비율이 +5% 이상이면 매수
      sell_threshold_ratio: 0.05   # 같은 비율이 -5% 이하이면 매도
  mean_reversion:
    rsi:
      enabled: true
      period: 14
      oversold: 30
      overbought: 70
    volatility_breakout:
      enabled: true
      k: 0.5   # Larry Williams 변동성 돌파 계수

regime_filter:
  enabled: true
  adx_period: 14
  trend_threshold: 25.0   # ADX >= this: 추세추종 전략만 신규 진입 허용
  range_threshold: 20.0   # ADX <= this: 평균회귀 전략만 신규 진입 허용
                          # (20~25 사이는 애매 구간 -> 신규 진입 보류, 청산은 항상 허용)

signal_combination:
  entry_mode: any   # "any": 활성 구간(추세/횡보)에 속한 전략 중 하나만 신호를 내도 진입
                    # "all": 전부 동의해야 진입 (더 엄격하지만, 서로 다른 로직의 전략끼리는
                    #        같은 날 동시에 신호가 겹치는 경우가 드물어 거래가 거의 발생하지 않을 수 있음)
  rank_entries_by_momentum: false   # true면 같은 날 여러 종목이 동시에 신호를 낼 때
                                    # 최근 momentum_window일 수익률이 가장 큰 종목부터 자본 배정
  momentum_window: 20

volume_filter:
  enabled: true      # 백테스트로 검증한 순수 개선 (아래 "다음 방향 검증 기록" 참고)
  window: 20
  multiplier: 1.5    # 최근 20일 평균 거래량의 1.5배 이상일 때만 진입 확인

costs:
  commission_pct: 0.015   # 매수/매도 각각 부과되는 수수료율 (%), 증권사별 상이
  sell_tax_pct: 0.18      # 매도 시 증권거래세 등 (%), 국내 상장주식 기준 예시치 (변경될 수 있음)

data_feed:
  interval: "1d"
  lookback_days: 100   # 모의투자(paper) 모드에서 신호 계산에 쓰는 최근 봉 개수

backtest:
  history_days: 1700   # 약 6.75년치 거래일 (2020 코로나 급락 + 2022 금리인상 하락장 모두 포함)

hybrid:
  enabled: true                  # 시드를 전략 슬리브 + Buy&Hold 슬리브로 나눠서 운용 (백테스트로 검증한 기본값)
  strategy_allocation_pct: 0.5   # 시드 중 전략에 배분하는 비율 (나머지는 워치리스트 동일비중 매수 후 보유)
                                  # 0.5가 MDD 최저점이라 채택 (README "하이브리드 구조 검증 기록" 참고).
                                  # 0.2~0.8 사이 다른 값도 전부 지원되니 성향에 맞게 조정 가능:
                                  #   낮출수록(0.2~0.3) 수익률↑ MDD도 다시 소폭↑, 1.0=순수 전략, 0.0=순수 Buy&Hold
                                  # paper/live 모드는 아직 Buy&Hold 슬리브 상태를 세션 간 유지하지 못함
                                  # (영속 저장소 미구현) - 백테스트에서만 결합 성과를 계산함

watchlist:
  - "005930.KS"   # 삼성전자 (반도체)
  - "058470.KQ"   # 리노공업 (반도체 부품, 100만원 시드에 맞춰 SK하이닉스 대체 - 226만원짜리라 비중 60%로도 1주도 못 샀음)
  - "035420.KS"   # NAVER (플랫폼)
  - "035720.KS"   # 카카오 (플랫폼, 2022년 이후 뚜렷한 하락 구간 포함)
  - "204320.KS"   # 만도 (자동차 부품, 100만원 시드에 맞춰 현대차 대체 - 46.5만원이라 비중 30%로 0주였음)
  - "051910.KS"   # LG화학 (2차전지/화학, 2022년 급등 후 조정)
  - "105560.KS"   # KB금융 (금융지주)
  - "015760.KS"   # 한국전력 (유틸리티, 장기 박스권/약세 성향)
  - "068270.KS"   # 셀트리온 (바이오)
  - "003550.KS"   # LG (지주사)

broker:
  provider: kis    # mock | kis
                    # "kis"는 실제 한국투자증권 계좌로 paper 모드에서만 적용됨.
                    # backtest 모드는 provider 값과 무관하게 항상 mock+yfinance로 돈다
                    # (실계좌 API에 반복 조회하기엔 느리고 rate limit이 걸림).
  kis:
    env: demo       # demo(모의투자) | real(실전투자)
                    # 절대 real을 기본값으로 두지 말 것 - 모의투자로 충분히 검증 후에만 전환.
                    # KIS_APP_KEY/KIS_APP_SECRET(실전), KIS_PAPER_APP_KEY/KIS_PAPER_APP_SECRET(모의),
                    # KIS_ACCOUNT_NO, KIS_ACCOUNT_PRODUCT_CD 환경변수가 필요함 (README 참고)
